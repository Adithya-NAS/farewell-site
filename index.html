<!DOCTYPE html>
<html>
<head>
    <title>www.gptfarewell23-25.com</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #a8d0ff, #cfe8ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.85);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.2);
        }

        h1 {
            font-weight: bold;
            color: #003366;
        }

        img {
            width: 280px;
            opacity: 0.9;
            margin: 20px 0;
        }

        input {
            padding: 10px;
            width: 220px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background-color: #0077cc;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #005fa3;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>

    <script>
        function checkPassword() {
            let pass = document.getElementById("password").value;
            if (pass === "1234") {
                window.location.href = "video.html";
            } else {
                document.getElementById("errorMsg").innerText = "Incorrect Password!";
            }
        }

        // ENTER key support
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("password").addEventListener("keypress", function(e) {
                if (e.key === "Enter") {
                    checkPassword();
                }
            });
        });
    </script>
</head>

<body>

<div class="container">
    <h1><b>Welcome to CSE Farewell Memory</b></h1>

    <img src="logo.png" alt="College Logo">

    <h3>Enter the Password</h3>

    <input type="password" id="password" placeholder="Enter Password"><br>
    <button onclick="checkPassword()">Submit</button>

    <div id="errorMsg" class="error"></div>
</div>

</body>
</html>
